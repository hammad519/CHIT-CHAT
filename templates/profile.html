<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Profile — Chit Chat</title>
    <link rel="icon" type="image/png" href="/static/Images/chit_chat.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #30364F;
            --muted: #ACBAC4;
            --bg-dark: rgba(48,54,79,0.05);
            --card-radius: 24px;
            --shadow: 0 20px 60px rgba(48,54,79,0.08);
            --sent: #30364F;
            --recv: #fff8ea;
            --accent: rgba(48,54,79,0.06);
            --glass: rgba(255,255,255,0.8);
            --danger: #30364F;

            --charcoal: #1A1C23;
            --sand: #E1D9BC;
            --ivory: #F0F0DB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* ✅ DISABLE SCROLL */
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--ivory) 0%, #ffffff 50%, var(--sand) 100%);
            color: var(--charcoal);
            padding: 16px;
        }

        .profile-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(25px);
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            padding: 28px 22px; /* slightly reduced for small screens */
            position: relative;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);

            max-height: 100%; /* ✅ Prevent overflow */
        }

        .back-nav {
            position: absolute;
            top: 18px;
            left: 18px;
            text-decoration: none;
            color: var(--charcoal);
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
            padding-bottom: 3px; 
            line-height: 1;
        }
        .back-nav:hover { 
            transform: translateX(-3px) scale(1.05);
            background: var(--recv);
        }

        .pic-section {
            position: relative;
            width: 95px;   /* ✅ Slightly smaller for mobile */
            height: 95px;
            margin: 10px auto 14px;
        }

        .pic-display {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            background: var(--muted);
        }

        .upload-trigger {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--charcoal);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #fff;
            transition: 0.3s ease;
        }
        .upload-trigger:hover { transform: scale(1.1); }
        .upload-trigger svg { fill: #fff; width: 14px; height: 14px; }

        .user-name {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--charcoal);
        }

        .user-status {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 16px;
            display: block;
        }

        .data-card {
            background: rgba(255,255,255,0.55);
            border-radius: 18px;
            padding: 16px;
            text-align: left;
            margin-bottom: 16px;
            border: 1px solid rgba(26,28,35,0.06);
            backdrop-filter: blur(10px);
        }

        .info-row { margin-bottom: 14px; }
        .info-row:last-child { margin-bottom: 0; }
        
        .info-row label {
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 3px;
        }

        .info-row .val {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--charcoal);
            word-break: break-all;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .save-btn {
            width: 100%;
            background: var(--charcoal);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .save-btn:hover {
            transform: translateY(-1px);
        }

        .remove-btn {
            width: 100%;
            background: transparent;
            color: var(--charcoal);
            border: 1.3px solid rgba(26,28,35,0.25);
            padding: 11px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .remove-btn:hover {
            background: var(--charcoal);
            color: #fff;
        }

        #fileInput { display: none; }

        /* ✅ Extra safety for very small phones */
        @media (max-height: 640px) {
            .profile-container {
                padding: 22px 18px;
            }
            .data-card {
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <a href="{{ url_for('chat') }}" class="back-nav" title="Back to Chat">←</a>
        
        <form action="/update_profile" method="POST" enctype="multipart/form-data">
            <div class="pic-section">
                <img src="{{ url_for('static', filename='uploads/' + profile_pic) if profile_pic else url_for('static', filename='Images/default_profile.png') }}" class="pic-display" id="previewImg">
                <label for="fileInput" class="upload-trigger">
                    <svg viewBox="0 0 24 24"><path d="M3 4V1h2v3h3v2H5v3H3V6H0V4h3zm3 6V7h3V4h7l1.83 2H21c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V10h3zm7 9c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-3.2-5c0 1.77 1.43 3.2 3.2 3.2s3.2-1.43 3.2-3.2-1.43-3.2-3.2-3.2-3.2 1.43-3.2 3.2z"/></svg>
                </label>
                <input type="file" name="profile_pic" id="fileInput" accept="image/*">
            </div>

            <h2 class="user-name">{{ username }}</h2>
            <span class="user-status">Personal Information</span>

            <div class="data-card">
                <div class="info-row">
                    <label>Full Name</label>
                    <div class="val">{{ username }}</div>
                </div>

                <div class="info-row">
                    <label>Gmail Address</label>
                    <div class="val">{{ email }}</div>
                </div>

                <div class="info-row">
                    <label>Phone Number</label>
                    <div class="val">{{ phone }}</div>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="save-btn">Update Profile Photo</button>
                <a href="/remove_profile_pic" class="remove-btn">Remove Photo</a>
                <a href="/logout" class="remove-btn">Logout</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('fileInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                 document.getElementById('previewImg').src = URL.createObjectURL(file);
            }
        }
    </script>
</body>
</html>
